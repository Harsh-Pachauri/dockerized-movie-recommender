<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CineVerse AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at 20% 20%, #1a1a2e, #0f0f1a 60%);
  color: white;
}

/* Animated gradient glow */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: conic-gradient(
    from 180deg,
    #ff0080,
    #7928ca,
    #2afadf,
    #ff0080
  );
  animation: rotate 20s linear infinite;
  opacity: 0.08;
}

@keyframes rotate {
  to { transform: rotate(360deg); }
}

/* Layout */
.container {
  display: flex;
  height: 100vh;
}

/* LEFT SIDE */
.left {
  flex: 1;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.brand {
  font-family: 'Orbitron', sans-serif;
  font-size: 48px;
  letter-spacing: 2px;
  background: linear-gradient(90deg, #ff4d6d, #5f9cff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.tagline {
  margin-top: 15px;
  color: #aaa;
  font-size: 16px;
  max-width: 400px;
}

/* FORM */
.form {
  margin-top: 40px;
  width: 320px;
}

.input-box {
  position: relative;
  margin-bottom: 20px;
}

.input-box input {
  width: 100%;
  padding: 14px 14px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: white;
  transition: 0.3s;
}

.input-box input:focus {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 0 15px rgba(95,156,255,0.4);
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(135deg, #ff4d6d, #5f9cff);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 25px rgba(95,156,255,0.4);
}

/* RIGHT SIDE */
.right {
  flex: 1.2;
  padding: 40px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  overflow-y: auto;
}

/* MOVIE CARD */
.card {
  width: 160px;
  height: 240px;
  border-radius: 16px;
  background: linear-gradient(145deg, #111, #1c1c2b);
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
  padding: 15px;
  position: relative;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 20px 40px rgba(95,156,255,0.3);
}

.poster {
  height: 120px;              /* smaller height */
  border-radius: 10px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d0d15;        /* fallback bg */
}

.poster img {
  width: auto;
  height: 100%;
  max-width: 100%;
  object-fit: contain;        /* 👈 key: no crop */
  opacity: 0.85;
  transition: 0.3s ease;
}

/* subtle hover polish */
.card:hover .poster img {
  transform: scale(1.05);
  opacity: 1;
}
.movie-title {
  font-size: 13px;
  font-weight: 500;
}

.rating {
  font-size: 12px;
  color: #ffcc70;
}

/* Scroll styling */
.right::-webkit-scrollbar {
  width: 6px;
}
.right::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="left">
    <div class="brand">CINEVERSE</div>
    <div class="tagline">
      Discover films tailored to your taste. Powered by AI. Designed for cinephiles.
    </div>

    <form action="{{ url_for('recommend') }}" method="post" class="form">

      <div class="input-box">
        <input type="text" name="movie" placeholder="Enter a movie..." required>
      </div>

      <div class="input-box">
        <input type="text" name="rating" placeholder="Your rating (1–5)" required>
      </div>

      <button class="btn">✨ Generate Recommendations</button>

    </form>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">

    {% for each in recommended_movie %}
    <div class="card">
      <div class="poster">
  <img src="{{ url_for('static', filename='movies.jpg') }}" alt="movie poster">
</div>
      <div class="movie-title">{{ each }}</div>
      <div class="rating">⭐ AI Pick</div>
    </div>
    {% endfor %}

  </div>

</div>

</body>
</html>
